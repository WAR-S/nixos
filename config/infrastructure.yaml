# Единый конфиг для edge-node. Переменные переиспользуются в layers/configuration/*.
release-name: "nixos-v0.0.1-14mar2026"
os:
  hostname: edge-node
  timezone: UTC
  diskDevice: /dev/nvme0n1

# Глобальный DNS (04-resolver): Cloudflare, Google, Quad9.
resolver:
  nameservers:
    - "8.8.8.8"
    - "8.8.4.4"
    - "9.9.9.9"

# Точка доступа Wi‑Fi + dnsmasq (06-wifi-ap). Тот же gateway используется в 07-postgres и 08-k3s.
network:
  ap:
    interface: wlp2s0
    gateway: "10.10.10.1"
    subnet: "10.10.10.0/24"
    domain: domain.local
    dhcpRange: "10.10.10.2,10.10.10.50,12h"
  wifi:
    ssid: xxx
    psk: "qwerty123"
    regdom: US

# PostgreSQL (07-postgres): слушает на network.ap.gateway.
postgres:
  listenAddress: "10.10.10.1"
  database: "test-data-base"
  user: test
  password: "qwerty123"

# K3s (08-k3s): nodeIP = network.ap.gateway.
k3s:
  nodeName: k3s-node

  airgapImages:
    - url: "https://github.com/k3s-io/k3s/releases/download/v1.32.12%2Bk3s1/k3s-airgap-images-amd64.tar.gz"
      sha256: "3f45abe980b2a6ba9ba8037d9b5a96ab199ce5ddf53c496e99087422d20f0383"

  charts:

    ingress-nginx:
      repo: "https://kubernetes.github.io/ingress-nginx"
      chart: "ingress-nginx"
      version: "4.11.1"
      sha256: "sha256-o6yI6vwa8fnRyD1lfHq7oX+LMPlfxuOB+PY2CjAd2dw="
      namespace: "ingress-nginx"

      values:
        controller:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          service:
            enabled: false
          config:
            allow-snippet-annotations: "true"
            enable-underscores-in-headers: "true"

# OpenVPN client (09-vpn). Секреты лучше хранить отдельными файлами и подставлять путями.
vpn:
  openvpn:
    enable: true
    remoteHost: "vpn.example.lan"
    remotePort: 1194
    routeNet: "10.61.0.0"
    routeMask: "255.255.0.0"
    # caFile: "/etc/openvpn/ca.crt"
    # certFile: "/etc/openvpn/client.crt"
    # keyFile: "/etc/openvpn/client.key"
    # tlsCryptFile: "/etc/openvpn/tls-crypt.key"
    # tlsAuthFile: "/etc/openvpn/tls-auth.key"
    # Или можно прямо сюда (попадёт в /nix/store):
    # caInline: |
    #   -----BEGIN CERTIFICATE-----
    #   ...
    #   -----END CERTIFICATE-----
    # certInline: |
    #   -----BEGIN CERTIFICATE-----
    #   ...
    #   -----END CERTIFICATE-----
    # keyInline: |
    #   -----BEGIN PRIVATE KEY-----
    #   ...
    #   -----END PRIVATE KEY-----
    # tlsCryptInline: |
    #   -----BEGIN OpenVPN Static key V1-----
    #   ...
    #   -----END OpenVPN Static key V1-----

